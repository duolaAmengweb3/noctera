name: Noctera
options:
  bundleIdPrefix: com.duolaameng
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "2"
    DEVELOPMENT_TEAM: H7DV8ZSZGB
    SWIFT_VERSION: "5.0"
    ITSAppUsesNonExemptEncryption: false
targets:
  Noctera:
    type: application
    platform: iOS
    sources: [Sources, Resources]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.duolaameng.noctera
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: Noctera.entitlements
    info:
      path: Resources/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen: {}
        UISupportedInterfaceOrientations: [UIInterfaceOrientationPortrait]
        NSMicrophoneUsageDescription: "Noctera records your voice so you can capture a dream the moment you wake — transcribed and saved on your device."
        NSSpeechRecognitionUsageDescription: "Speech recognition turns your spoken dream into text, on your device."
        NSFaceIDUsageDescription: "Face ID keeps your dream journal private on this device."
    dependencies:
      - target: NocteraWidget
    scheme:
      testTargets: [NocteraTests, NocteraUITests]
      storeKitConfiguration: Resources/Noctera.storekit
  NocteraWidget:
    type: app-extension
    platform: iOS
    sources: [Widget, Sources/Shared]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.duolaameng.noctera.widget
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_ENTITLEMENTS: NocteraWidget.entitlements
    info:
      path: Widget/Info.plist
      properties:
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDisplayName: Noctera
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
  NocteraTests:
    type: bundle.unit-test
    platform: iOS
    sources: [Tests]
    dependencies: [{ target: Noctera }]
    settings:
      base: { PRODUCT_BUNDLE_IDENTIFIER: com.duolaameng.noctera.tests, GENERATE_INFOPLIST_FILE: YES }
  NocteraUITests:
    type: bundle.ui-testing
    platform: iOS
    sources: [UITests]
    dependencies: [{ target: Noctera }]
    settings:
      base: { PRODUCT_BUNDLE_IDENTIFIER: com.duolaameng.noctera.uitests, GENERATE_INFOPLIST_FILE: YES }
